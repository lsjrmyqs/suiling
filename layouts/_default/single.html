{{ define "main" }}
<article class="chapter-content">
    <h1>{{ .Title }}</h1>
    
    <!--  新增的批注功能提示框  -->
    <div class="comment-notice">
         <b>互动提示：</b>长按或选中文本即可进行 划线 与 段落批注 。<br>
        <span class="small-text">首次使用需注册账号，请注意<b>前往填写的邮箱点击验证链接</b>方可成功发言。点击右上角眼睛图标可隐藏所有批注。</span>
    </div>

    <div class="content-body">
        {{ .Content }}
    </div>

    <div class="content-body">
        {{ .Content }}
    </div>

    <!-- 上一章、下一章导航 -->
    <div class="pagination">
        <!-- 注意：Hugo默认按时间或Weight排序，Prev是前一个(上一章)，Next是后一个(下一章) -->
        {{ with .NextInSection }}
            <a href="{{ .RelPermalink }}">← 上一章：{{ .Title }}</a>
        {{ else }}
            <span></span> <!-- 占位用，保持布局平衡 -->
        {{ end }}

        <a href="/">返回目录</a>

        {{ with .PrevInSection }}
            <a href="{{ .RelPermalink }}">下一章：{{ .Title }} →</a>
        {{ end }}
    </div>
</article>

<!--  就是这行神奇的代码，接入 Hypothes.is 段落批注功能  -->
<script src="https://hypothes.is/embed.js" async></script>

{{ end }}
